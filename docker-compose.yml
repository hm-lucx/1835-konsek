version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: 1835-konsek-db
    environment:
      POSTGRES_DB: konsek
      POSTGRES_USER: konsek
      POSTGRES_PASSWORD: konsek
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U konsek"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: 1835-konsek-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 1835-konsek-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ******postgres:5432/konsek
      REDIS_URL: redis://redis:6379
      PYTHONUNBUFFERED: 1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: 1835-konsek-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    command: pnpm run dev

volumes:
  postgres_data:
