name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: konsek
          POSTGRES_USER: konsek
          POSTGRES_PASSWORD: konsek
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        working-directory: ./backend
        run: uv pip install --system -e ".[dev]"

      - name: Run ruff
        working-directory: ./backend
        run: ruff check .

      - name: Run mypy strict
        working-directory: ./backend
        run: mypy . --strict

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: ******localhost:5432/konsek
          REDIS_URL: redis://localhost:6379
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install

      - name: Type check
        working-directory: ./frontend
        run: pnpm run type-check

      - name: Run linter
        working-directory: ./frontend
        run: pnpm run lint

      - name: Build
        working-directory: ./frontend
        run: pnpm run build
